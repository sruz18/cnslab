<!DOCTYPE html>
<html>
<head>
<title>Diffie-Hellman</title>
</head>
<body>

<h2>Diffie-Hellman Key Exchange</h2>

p: <input id="p"><br>
g: <input id="g"><br>
a: <input id="a"><br>
b: <input id="b"><br><br>

<button onclick="calculate()">Generate Key</button>

<p id="output"></p>

<script>
function calculate() {
 let p = +document.getElementById("p").value;
 let g = +document.getElementById("g").value;
 let a = +document.getElementById("a").value;
 let b = +document.getElementById("b").value;

 let A = Math.pow(g, a) % p;
 let B = Math.pow(g, b) % p;

 let key1 = Math.pow(B, a) % p;
 let key2 = Math.pow(A, b) % p;

 document.getElementById("output").innerHTML =
  "Public Key A: " + A + "<br>" +
  "Public Key B: " + B + "<br><br>" +
  "Secret from A: " + key1 + "<br>" +
  "Secret from B: " + key2 + "<br><br>" +
  (key1 === key2 ? "✅ Shared Key: " + key1 : "❌ Keys do not match");
}
</script>

</body>
</html>
